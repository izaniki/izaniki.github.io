<!DOCTYPE html>

  <title>Vana'diel Project Page</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="ffxi-container">
    <header class="ffxi-header">
      <h1>My Vana'diel Adventures</h1>

    <nav class="ffxi-menu">
